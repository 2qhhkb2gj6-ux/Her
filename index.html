<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message For You ❤️</title>
    <!-- Premium Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #fff5f6 0%, #ffdce3 50%, #ffcad6 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
            text-align: center;
            position: relative;
        }
        /* Floating background elements for premium feel */
        .bg-decor {
            position: absolute;
            font-size: 2rem;
            opacity: 0.2;
            animation: floatAround 6s infinite ease-in-out;
        }
        @keyframes floatAround {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(15deg); }
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(255, 154, 178, 0.3);
            max-width: 420px;
            width: 100%;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            animation: cardAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
        }
        @keyframes cardAppear {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .heading-style {
            font-family: 'Playfair Display', serif;
            color: #bd3a55;
            font-size: 1.8rem;
            line-height: 1.4;
            margin-bottom: 15px;
        }
        p { 
            color: #4a3b3e; 
            line-height: 1.8; 
            font-size: 1.1rem; 
            margin-bottom: 30px;
            white-space: pre-line;
            font-weight: 400;
        }
        /* Premium Soft Glossy Buttons */
        button {
            background: linear-gradient(135deg, #ff5e84 0%, #ff3366 100%);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.05rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 20px rgba(255, 51, 102, 0.25);
            width: 100%;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            -webkit-tap-highlight-color: transparent;
        }
        button:active {
            transform: scale(0.96);
            box-shadow: 0 4px 10px rgba(255, 51, 102, 0.25);
        }
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: 100%;
        }
        #no-btn {
            background: linear-gradient(135deg, #e3d5d7 0%, #d1bfc2 100%);
            color: #5c4d50;
            box-shadow: none;
        }
        .heart-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(255,51,102,0.2));
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
    </style>
</head>
<body>

    <!-- Premium Background Visuals -->
    <div class="bg-decor" style="top: 10%; left: 10%; animation-delay: 0s;">🌸</div>
    <div class="bg-decor" style="top: 80%; left: 15%; animation-delay: 1.5s;">✨</div>
    <div class="bg-decor" style="top: 20%; right: 12%; animation-delay: 3s;">💝</div>
    <div class="bg-decor" style="top: 75%; right: 10%; animation-delay: 4.5s;">🌸</div>

    <div class="card" id="story-card">
        <div class="heart-icon" id="card-emoji">💝</div>
        <div id="dynamic-content">
            <h2 class="heading-style">Hey you... ✨</h2>
            <p id="text-content">Do you know what today issss????? 😝😝😝

It's five whole months since we started talking 😭🥹</p>
        </div>
        <button id="next-btn" onclick="nextSlide()">Read our story... ➔</button>
        
        <div class="btn-container" id="final-btns" style="display: none;">
            <button id="yes-btn" onclick="sayYes()">Yes, completely! 💍❤️</button>
            <button id="no-btn" onclick="moveNo()">No 🙃</button>
        </div>
    </div>

    <script>
        const paragraphs = [
            ["Our Timeline 🗓️", "Five months of calls.\nFive months of texting every single day.\nFive months of random conversations, laughter, teasing, serious talks, prayers, deep moments and somehow not one single day has ever felt boring."],
            ["Safe Space 🤍", "Even when there's nothing to talk about, we still somehow find something 😭. Even silence with you never feels awkward.\n\nYou've become HOME to me."],
            ["Pure Comfort ✨", "A place where I feel loved, understood, accepted, and at peace.\n\nI can't even properly explain the comfort I feel whenever I'm talking to you. No matter how stressful my day is, hearing from you somehow makes everything softer."],
            ["An Answered Prayer 🙏", "And the craziest part is, you came into my life at the perfect time.\n\nI remember on the 31st of December 2025, I prayed and hoped that 2026 would be my best year yet. I wanted happiness. Growth. Peace. Something genuine..."],
            ["God's Timing ⏳", "...Little did I know that just four days into the year, God would answer that prayer in the most unexpected and beautiful way possible by bringing you into my life."],
            ["My Biggest Blessing 🎁", "You have genuinely been one of my biggest blessing this year frr because ever since you came into my life, so many things changed in the best way possible."],
            ["Unconditional 🥺", "You've loved me in ways I didn't even know I needed. You've stood by me fully; physically, mentally, emotionally, spiritually, and even financially 😭.\n\nYou show up for me every single time."],
            ["How You Lead Me ✨", "You encourage me to pray.\nYou push me closer to God.\nYou remind me who I'm supposed to be when I lose sight of myself.\nYou correct me with love."],
            ["No Judgement 🕊️", "You never judged me for my mistakes, my past, my flaws, or the parts of me I was insecure about.\n\nYou accepted me completely."],
            ["My Confidence ⚡", "And just so you know...\n\nYou're one of the biggest reasons I feel confident in myself today."],
            ["The Impact 🌹", "The way you believe in me, support me, encourage me, and speak life into me has changed me so much. You make me feel seen. You make me feel capable. You make me feel like I can actually become everything I dream of becoming."],
            ["Rarest Connection 🌱", "You don't just make me happy.\n\nYou make me better.\n\nAnd that's one of the rarest things a person can ever do for another human being."],
            ["Ethereal 🌟", "You are genuinely one of the most amazing women I've ever met, not just because of how ethereally gorgeous you are but because your heart is beautiful too."],
            ["Why You Are Rare 🤍", "The way you care.\nThe way you love.\nThe way you carry God.\nThe way you make people around you feel safe.\n\nYou are rare."],
            ["A Realization 🙃", "And somewhere along these five months, I realized something 🙃"],
            ["Doing Life Together 🤝", "I don't just like talking to you. I don't just enjoy your company.\n\nI genuinely want to do life with you."],
            ["Forever Intentional ❤️", "I want to grow with you. Pray with you. Laugh with you. Build with you. Celebrate wins with you. Be there during hard moments with you.\n\nI want us to keep choosing each other over and over again.\n\nBecause with you, everything feels intentional. Peaceful. Different."],
            ["My Future 🌅", "You complete me in ways I can't even explain. You're my biggest motivation. When I think about the future, somehow you're always in it.\n\nWhen I think about becoming a better person, you're one of the biggest reasons why I want to keep growing."],
            ["My Person 🔒", "And honestly, somewhere along the way, you stopped feeling like “just someone I talk to.”\n\nYou became my person."],
            ["First & Last 📱", "The one I want to tell everything to first.\nThe one I want beside me through every stage of life.\nThe one whose presence feels like peace no matter what's happening around me."],
            ["Truthfully... 👀", "And I know we already have something beautiful, but truthfully?\n\nI want to call you mine in the real sense."],
            ["To Openly Love You 💞", "I want to love you openly, intentionally, and properly. I want to be the person you can always rely on the same way you've become someone I rely on too."],
            ["The Bold Step... 🫠", "So here I am, taking the bold step... 🙃❤️"]
        ];

        let currentStep = 0;
        let noCount = 0;
        const emojis = ["🌟", "⏰", "🏠", "🧸", "🤍", "🙏", "✨", "💝", "🌸", "🛡️", "🦋", "📈", "👑", "🌹", "🕯️", "👀", "💍", "🌱", "🌅", "🔒", "📱", "💌", "❤️", "🔥"];

        function nextSlide() {
            const dynamicContent = document.getElementById("dynamic-content");
            const nextBtn = document.getElementById("next-btn");
            const finalBtns = document.getElementById("final-btns");
            const card = document.getElementById("story-card");
            const emojiEl = document.getElementById("card-emoji");

            // Animation Reset
            card.style.animation = 'none';
            card.offsetHeight; 
            card.style.animation = 'cardAppear 0.5s ease-out';

            if (currentStep < paragraphs.length) {
                emojiEl.innerText = emojis[currentStep % emojis.length];
                dynamicContent.innerHTML = `<h2 class="heading-style">${paragraphs[currentStep][0]}</h2><p>${paragraphs[currentStep][1]}</p>`;
                currentStep++;
            } else {
                emojiEl.innerText = "👑";
                dynamicContent.innerHTML = `<h2 class="heading-style" style="font-size: 1.6rem; margin-top:20px;">Will you be my woman of God?<br><br>And would you grant me the privilege to be the man in your life?? 🙃❤️</h2><p></p>`;
                nextBtn.style.display = "none";
                finalBtns.style.display = "flex";
            }
        }

        function moveNo() {
            const noBtn = document.getElementById("no-btn");
            const yesBtn = document.getElementById("yes-btn");
            noCount++;

            if (noCount === 1) {
                noBtn.innerText = "Wait, wrong button? Try again 🤨";
                yesBtn.style.transform = "scale(1.1)";
            } else if (noCount === 2) {
                noBtn.innerText = "Error: Button broken. Tap Yes. 🖥️";
                yesBtn.style.transform = "scale(1.2)";
            } else if (noCount >= 3) {
                noBtn.innerText = "Fine, I'm a 'Yes' button now! 🥰";
                noBtn.style.background = "linear-gradient(135deg, #ff5e84 0%, #ff3366 100%)";
                noBtn.style.color = "white";
                noBtn.onclick = sayYes;
                yesBtn.style.transform = "scale(1.3)";
            }
        }

        function sayYes() {
            const card = document.getElementById("story-card");
            card.innerHTML = "<div class='heart-icon'>🎉❤️✨</div><h2 class='heading-style' style='font-size: 2rem;'>SHE SAID YES!</h2><p>The beginning of forever.\n\nTake a screenshot and go text him right now! 📲✨</p>";
        }
    </script>
</body>
</html>
